version: 2

models:
  - name: stg_olist_order_reviews
    description: "Staging table for order items data with cleaned fields"
    columns:
      - name: review_id
        description: "Id of the review"  
        tests:
          - not_null
      - name: order_id
        description: "Id of the order"
        tests:
          - not_null
          - relationships: { to: ref('stg_orders'), field: order_id }
      