version: 2

models:
  - name: stg_olist_orders
    description: "Staging table for orders data with cleaned fields"
    columns:
      - name: order_id
        description: "Id of the order"
        tests:
          - not_null
          - relationships: { to: ref('stg_orders'), field: order_id }
      - name: customer_id
        description: "Id of the customer"
        tests:
          - not_null
          - relationships: { to: ref('stg_customers'), field: customer_id }

      - name: order_status
        description: "Status of the order"

      - name: purchase_ts
        description: "Timestamp when the order was placed"  

      - name: approved_ts
        description: "Timestamp when the order payment was approved"

      - name: delivered_carrier_ts
        description: "Timestamp when the order was handled to the logistic partner"
      
      - name: delivered_customer_ts
        description: "Timestamp when the order was delivered to the customer"
      
      - name: estimated_delivery_ts
        description: "Estimated delivery timestamp informed to customer at the purchase moment"
