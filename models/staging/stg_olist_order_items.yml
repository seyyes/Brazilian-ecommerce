version: 2

models:
  - name: stg_olist_order_items
    description: "Staging table for order items data with cleaned fields"
    columns:
      - name: order_id
        description: "Id of the order"
        tests:
          - not_null
          - relationships: { to: ref('stg_orders'), field: order_id }
      - name: order_item_id
        description: "Position of the item within an order (not globally unique)"  
        tests:
          - not_null
      - name: product_id
        description: "Id of the product"
        tests:
          - not_null
          - relationships: { to: ref('stg_products'), field: product_id }
      - name: seller_id
        description: "Id of the seller"
        tests:
          - not_null
          - relationships: { to: ref('stg_sellers'), field: seller_id }
      - name: order_item_sk
        description: "Surrogate key for the order item"
        tests:
          - not_null
          - unique
      - name: shipping_limit_ts
        description: "The date by which the order item should be shipped"
        tests:
          - not_null  
      - name: price
        description: "The price of the order item"
        tests:
          - not_null      
      - name: freight_value
        description: "The freight value for the order item"