version: 2

models:
  - name: stg_olist_products
    description: "Staging table for products data with cleaned fields"
    columns:
      - name: product_id
        description: "Id of the product"
        tests:
          - not_null
          - unique
      - name: product_category_name
        description: "Name of the product category in Portuguese"
        tests:
          - relationships: { 
              to: ref('stg_product_category_name_translation'), 
              field: product_category_name
            }