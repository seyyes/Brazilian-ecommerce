version: 2

models:
  - name: stg_olist_sellers
    description: "Staging table for sellers data with cleaned fields"
    columns:
      - name: seller_id
        description: "Id of the seller"
        tests:
          - not_null
          - unique
      - name: seller_zip_code_prefix
        description: "Zip code prefix of the seller"
        tests:
          - not_null